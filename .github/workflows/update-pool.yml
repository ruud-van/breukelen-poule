# Auto-update voor de Breukelen-bookmaker pool.
# Draait een paar keer per dag, haalt nieuwe uitslagen op, herrekent de
# stand en commit data.json + index.html. De odds-snapshot wordt NIET
# aangeraakt; die is eenmalig bevroren.
name: update-pool

on:
  schedule:
    # tijden in UTC; NL = UTC+2 (zomer). Afgestemd op WK-2026-speeldagen.
    # Tien over het hele uur, zodat een wedstrijd die net afloopt zeker is verwerkt:
    # 00:10 UTC = 02:10 NL (na de avondduels), 03:10 UTC = 05:10 NL (na de late duels),
    # 06:10 UTC = 08:10 NL (ochtendverversing), 13:10 UTC = 15:10 NL, 21:10 UTC = 23:10 NL.
    - cron: "10 0,3,6,13,21 * * *"
  workflow_dispatch: {}            # handmatig te starten

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install xlrd numpy scipy
      - name: Haal uitslagen op (ESPN, geen sleutel nodig)
        run: python results_fetch.py
      - name: Herbouw stand en pagina
        run: |
          python build_pool.py        # productie-build: leest formulieren + odds.json + results_state.json
          python build_page.py
      - name: Commit indien gewijzigd
        run: |
          git config user.name "pool-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json index.html regels.html results_state.json knockout.json
          git diff --cached --quiet || git commit -m "update stand $(date -u +%FT%TZ)"
          git push
